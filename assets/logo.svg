<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="analysisGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>

  <!-- PCB board display panel -->
  <rect x="12" y="12" width="115" height="85" rx="6" fill="url(#bgGrad)" stroke="#334155" stroke-width="1.5"/>

  <!-- PCB board outline inside panel -->
  <rect x="22" y="20" width="72" height="50" rx="3" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- PCB traces - cyan -->
  <line x1="28" y1="32" x2="48" y2="32" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="48" y2="48" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="48" x2="80" y2="48" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>

  <line x1="28" y1="42" x2="38" y2="42" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="42" x2="38" y2="28" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="28" x2="68" y2="28" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>

  <line x1="55" y1="55" x2="80" y2="55" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="55" x2="42" y2="55" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="55" x2="42" y2="62" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Via pads -->
  <circle cx="48" cy="32" r="3" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="48" cy="32" r="1" fill="#22d3ee"/>
  <circle cx="48" cy="48" r="3" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="48" cy="48" r="1" fill="#22d3ee"/>
  <circle cx="38" cy="42" r="3" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="38" cy="42" r="1" fill="#22d3ee"/>
  <circle cx="38" cy="28" r="3" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="38" cy="28" r="1" fill="#22d3ee"/>

  <!-- SMD component outlines -->
  <rect x="68" y="25" width="14" height="8" rx="1.5" fill="none" stroke="#64748b" stroke-width="1"/>
  <rect x="70" y="27" width="4" height="4" rx="0.5" fill="#475569"/>
  <rect x="76" y="27" width="4" height="4" rx="0.5" fill="#475569"/>

  <rect x="55" y="51" width="10" height="6" rx="1" fill="none" stroke="#64748b" stroke-width="1"/>
  <rect x="56" y="52.5" width="3" height="3" rx="0.5" fill="#475569"/>
  <rect x="61" y="52.5" width="3" height="3" rx="0.5" fill="#475569"/>

  <!-- IC component -->
  <rect x="58" y="34" width="16" height="12" rx="2" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <circle cx="61" cy="37" r="1" fill="#475569"/>
  <!-- IC pins -->
  <line x1="58" y1="37" x2="56" y2="37" stroke="#64748b" stroke-width="0.8"/>
  <line x1="58" y1="40" x2="56" y2="40" stroke="#64748b" stroke-width="0.8"/>
  <line x1="58" y1="43" x2="56" y2="43" stroke="#64748b" stroke-width="0.8"/>
  <line x1="74" y1="37" x2="76" y2="37" stroke="#64748b" stroke-width="0.8"/>
  <line x1="74" y1="40" x2="76" y2="40" stroke="#64748b" stroke-width="0.8"/>
  <line x1="74" y1="43" x2="76" y2="43" stroke="#64748b" stroke-width="0.8"/>

  <!-- Magnifying glass / analysis overlay - purple -->
  <circle cx="85" cy="60" r="16" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.7"/>
  <line x1="96" y1="71" x2="105" y2="80" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Analysis crosshair inside magnifying glass -->
  <line x1="80" y1="60" x2="90" y2="60" stroke="#a855f7" stroke-width="0.8" opacity="0.5"/>
  <line x1="85" y1="55" x2="85" y2="65" stroke="#a855f7" stroke-width="0.8" opacity="0.5"/>

  <!-- Pass/fail indicators -->
  <circle cx="28" cy="75" r="3" fill="#22c55e" opacity="0.8"/>
  <text x="28" y="77" font-family="system-ui" font-size="4" fill="#0f172a" text-anchor="middle" font-weight="bold">P</text>
  <circle cx="40" cy="75" r="3" fill="#22c55e" opacity="0.8"/>
  <text x="40" y="77" font-family="system-ui" font-size="4" fill="#0f172a" text-anchor="middle" font-weight="bold">P</text>
  <circle cx="52" cy="75" r="3" fill="#ef4444" opacity="0.8"/>
  <text x="52" y="77" font-family="system-ui" font-size="4" fill="#0f172a" text-anchor="middle" font-weight="bold">F</text>
  <circle cx="64" cy="75" r="3" fill="#22c55e" opacity="0.8"/>
  <text x="64" y="77" font-family="system-ui" font-size="4" fill="#0f172a" text-anchor="middle" font-weight="bold">P</text>

  <!-- Frequency label -->
  <text x="80" y="82" font-family="monospace" font-size="5" fill="#64748b">EMC</text>

  <!-- Signal waveform / impedance trace between PCB panel and text -->
  <g transform="translate(130, 15)">
    <!-- Waveform background bar -->
    <rect x="0" y="62" width="80" height="24" rx="4" fill="url(#bgGrad)" stroke="#334155" stroke-width="1"/>

    <!-- Impedance/signal waveform -->
    <path d="M 5 74 Q 10 66, 15 74 Q 20 82, 25 74 Q 30 66, 35 74 Q 40 82, 45 74 Q 50 66, 55 74 Q 60 82, 65 74 Q 70 66, 75 74"
          stroke="url(#waveGrad)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="d"
               values="M 5 74 Q 10 66, 15 74 Q 20 82, 25 74 Q 30 66, 35 74 Q 40 82, 45 74 Q 50 66, 55 74 Q 60 82, 65 74 Q 70 66, 75 74;
                       M 5 74 Q 10 68, 15 74 Q 20 80, 25 74 Q 30 64, 35 74 Q 40 84, 45 74 Q 50 68, 55 74 Q 60 80, 65 74 Q 70 68, 75 74;
                       M 5 74 Q 10 66, 15 74 Q 20 82, 25 74 Q 30 66, 35 74 Q 40 82, 45 74 Q 50 66, 55 74 Q 60 82, 65 74 Q 70 66, 75 74"
               dur="3s" repeatCount="indefinite"/>
    </path>

    <!-- Limit line -->
    <line x1="5" y1="67" x2="75" y2="67" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
    <text x="77" y="69" font-family="monospace" font-size="5" fill="#ef4444" opacity="0.7">LIM</text>
  </g>

  <!-- Domain badges -->
  <g transform="translate(135, 15)">
    <!-- SI badge -->
    <rect x="0" y="0" width="22" height="13" rx="3" fill="#164e63" stroke="#22d3ee" stroke-width="1"/>
    <text x="11" y="9.5" font-family="system-ui" font-size="7" font-weight="bold" fill="#a5f3fc" text-anchor="middle">SI</text>
    <!-- EMC badge -->
    <rect x="26" y="0" width="28" height="13" rx="3" fill="#4a1d96" stroke="#a855f7" stroke-width="1"/>
    <text x="40" y="9.5" font-family="system-ui" font-size="7" font-weight="bold" fill="#d8b4fe" text-anchor="middle">EMC</text>
    <!-- PI badge -->
    <rect x="58" y="0" width="20" height="13" rx="3" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
    <text x="68" y="9.5" font-family="system-ui" font-size="7" font-weight="bold" fill="#bbf7d0" text-anchor="middle">PI</text>
  </g>

  <!-- Title text -->
  <text x="240" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">MCP</text>
  <text x="240" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#94a3b8">PCB EMCopilot</text>
  <text x="240" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Design Review  |  EMC  |  Signal Integrity</text>

  <!-- Tool count badge -->
  <g transform="translate(240, 92)">
    <rect x="0" y="0" width="56" height="14" rx="7" fill="#164e63" stroke="#22d3ee" stroke-width="0.8"/>
    <text x="28" y="10" font-family="system-ui" font-size="8" font-weight="bold" fill="#a5f3fc" text-anchor="middle">93 Tools</text>
  </g>
</svg>

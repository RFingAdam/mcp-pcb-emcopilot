<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320"
     role="img" aria-label="mcp-pcb-emcopilot — PCB EMC + signal-integrity analysis (return paths, decoupling, DDR/PCIe/USB)">
  <title>mcp-pcb-emcopilot — PCB EMC + signal-integrity analysis</title>

  <defs>
    <linearGradient id="t-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0B1220"/>
      <stop offset="50%"  stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <filter id="t-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .accent        { color: #B45309; }
      .accent-stroke { stroke: #B45309; }
      .accent-fill   { fill:   #B45309; }
      /* Secondary tone for the E-field arc: same warm family, slightly brighter */
      .accent-2      { stroke: #F59E0B; }
    </style>
  </defs>

  <rect width="1280" height="320" fill="url(#t-bg)"/>

  <g stroke="#1E293B" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="40"  x2="1280" y2="40"/>
    <line x1="0" y1="80"  x2="1280" y2="80"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
  </g>

  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="240" height="240" rx="44" ry="44"
          fill="#0B1220" stroke="#1E293B" stroke-width="1"/>
    <rect x="12" y="12" width="216" height="216" rx="34" ry="34"
          fill="none" stroke="#1E293B" stroke-width="1" opacity="0.7"/>

    <!--
      Glyph: g-stackup with PCB-analysis differentiator.
      Base = layer stack + via (rust outlines). Differentiators vs the
      lineforge cross-section: (a) horizontal layer stack from above
      (not a single-trace cross-section), (b) plated through via from
      top to bottom, (c) an EMC return-current arc looping back through
      the inner plane — this is the "EMC + SI analysis" identity.
    -->
    <g transform="translate(40, 40)" filter="url(#t-glow)">
      <g fill="none" class="accent-stroke" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <!-- Layer stack -->
        <rect x="16" y="36"  width="128" height="10" stroke-opacity="0.9"/>
        <rect x="16" y="50"  width="128" height="20" stroke-opacity="0.4"/>
        <rect x="16" y="74"  width="128" height="10" stroke-opacity="0.7"/>
        <rect x="16" y="88"  width="128" height="20" stroke-opacity="0.4"/>
        <rect x="16" y="112" width="128" height="10" stroke-opacity="0.9"/>
        <!-- Plated through via -->
        <line x1="100" y1="32" x2="100" y2="126" stroke-opacity="0.85"/>
        <circle cx="100" cy="32"  r="3" class="accent-fill" stroke="none"/>
        <circle cx="100" cy="126" r="3" class="accent-fill" stroke="none"/>
      </g>
      <!-- EMC differentiator: return-current arc looping back through
           the inner ground plane (amber, slightly higher in the warm
           palette so it pops against the rust outlines). -->
      <g fill="none" class="accent-2" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.9">
        <path d="M 100 41 Q 60 41, 40 79 Q 32 79, 32 79" />
        <!-- arrowhead -->
        <path d="M 32 79 L 38 74 L 36 84 Z" fill="#F59E0B" stroke="none"/>
      </g>
      <!-- Small E-field marks above top copper to read as "near-field
           coupling" — keeps the EMC identity unambiguous. -->
      <g class="accent-2" stroke-width="1.5" stroke-opacity="0.6"
         stroke-linecap="round" fill="none">
        <path d="M 60 36 Q 60 26, 70 26"/>
        <path d="M 80 36 Q 80 22, 92 22"/>
      </g>
    </g>
  </g>

  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
    <text x="320" y="170" font-size="76" font-weight="800"
          fill="#F8FAFC" letter-spacing="-2">mcp-pcb-emcopilot</text>

    <g transform="translate(1100, 142)">
      <rect x="0" y="0" width="64" height="30" rx="15"
            fill="#0F172A" class="accent-stroke" stroke-width="1.5"/>
      <text x="32" y="20" font-size="14" font-weight="700"
            class="accent-fill" text-anchor="middle">v0.2.0</text>
    </g>

    <text x="320" y="208" font-size="22" font-weight="500" fill="#94A3B8">
      Open-source · MCP-enabled · PCB EMC + signal integrity
    </text>

    <g font-size="14" font-weight="600" fill="#64748B">
      <text x="320" y="240">stackup · return paths · decoupling · DDR · PCIe · USB · CISPR · FCC</text>
    </g>

    <g transform="translate(320, 256)" font-size="13" font-weight="700">
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="62" height="22" rx="11" fill="#1E293B"/>
        <text x="31" y="15" fill="#F59E0B" text-anchor="middle">Python</text>
      </g>
      <g transform="translate(72, 0)">
        <rect x="0" y="0" width="44" height="22" rx="11" fill="#1E293B"/>
        <text x="22" y="15" fill="#22D3EE" text-anchor="middle">CLI</text>
      </g>
      <g transform="translate(126, 0)">
        <rect x="0" y="0" width="50" height="22" rx="11" fill="#1E293B"/>
        <text x="25" y="15" fill="#A78BFA" text-anchor="middle">MCP</text>
      </g>
      <g transform="translate(186, 0)">
        <rect x="0" y="0" width="98" height="22" rx="11" fill="#1E293B"/>
        <text x="49" y="15" fill="#34D399" text-anchor="middle">Apache-2.0</text>
      </g>
    </g>
  </g>
</svg>

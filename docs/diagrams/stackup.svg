<text x="510" y="301" class="dim" text-anchor="start">0.035 mm</text>
<rect x="150" y="302" width="350" height="6" fill="#009900" stroke="#888" stroke-width="0.5"/>
<text x="140" y="309" class="label-sm-dark" text-anchor="end">Soldermask</text>
<text x="510" y="309" class="dim" text-anchor="start">0.025 mm</text>
<line x1="630" y1="55" x2="630" y2="308" stroke="#cc0000" stroke-width="2"/>
<line x1="625" y1="55" x2="635" y2="55" stroke="#cc0000" stroke-width="2"/>
<line x1="625" y1="308" x2="635" y2="308" stroke="#cc0000" stroke-width="2"/>
<text x="640" y="186" font-size="12" font-weight="bold" fill="#cc0000" font-family="Arial">Total: ~1.43 mm</text>
</svg>

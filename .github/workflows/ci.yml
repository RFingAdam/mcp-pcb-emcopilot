name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Install pinned ruff via the [dev] extra so local + CI agree on the
      # version (UP045 ignore needs ruff >= 0.9).
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[all,dev]"
      # mypy is currently advisory — the codebase has pre-existing type
      # debt (see #124) that we're tackling incrementally. The step still
      # runs and surfaces errors in the job log, but `continue-on-error`
      # converts a non-zero exit into a successful step so the PR check
      # is green until #124 closes.
      - run: mypy src/mcp_pcb_emcopilot/ --ignore-missing-imports
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[all,dev]"
      - run: pytest tests/ -v --tb=short
      - run: pytest tests/ --cov=mcp_pcb_emcopilot --cov-report=term-missing --cov-fail-under=50

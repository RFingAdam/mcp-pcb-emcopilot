name: Bug Report
description: Report a bug in MCP PCB EMCopilot
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to trigger the bug
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: dropdown
    id: format
    attributes:
      label: PCB Format
      options:
        - KiCad
        - ODB++
        - Gerber
        - Altium
        - IPC-2581
        - Allegro
        - N/A
  - type: input
    id: python-version
    attributes:
      label: Python Version
